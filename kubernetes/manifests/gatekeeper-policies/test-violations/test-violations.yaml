# Test 6: Writable root filesystem - should be denied by K8sReadOnlyRootFilesystem
apiVersion: v1
kind: Pod
metadata:
  name: test-writable-root
  namespace: applications
  labels:
    app: test-writable-root
    team: testing
    environment: dev
spec:
  containers:
    - name: test-writable-root
      image: docker.io/library/nginx:1.27
      securityContext:
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 1000
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 32Mi
