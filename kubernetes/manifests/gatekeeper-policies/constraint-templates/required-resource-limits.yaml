# =============================================================================
# Gatekeeper Constraint Template: K8sRequiredResourceLimits
#
# Requires all containers to have CPU and memory resource limits set.
# Without limits, a single container can consume all node resources,
# causing:
#   - Other pods to be OOM-killed or CPU-starved
#   - Node instability and potential kubelet failures
#   - Unpredictable costs (especially on auto-scaling clusters)
#
# Rego logic:
#   - Checks containers[] (not initContainers, which are short-lived)
#   - Rejects if resources.limits.cpu is missing
#   - Rejects if resources.limits.memory is missing
#
# Corresponding constraint: constraints/required-resource-limits.yaml
# (scoped to "applications" namespace)
# =============================================================================
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredresourcelimits
  annotations:
    description: "Denies containers that do not have CPU and memory resource limits set."
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredResourceLimits
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredresourcelimits

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.cpu
          msg := sprintf("Container '%v' does not have a CPU resource limit set.", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.memory
          msg := sprintf("Container '%v' does not have a memory resource limit set.", [container.name])
        }
