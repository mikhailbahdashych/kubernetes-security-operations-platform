# =============================================================================
# Gatekeeper Constraint Template: K8sReadOnlyRootFilesystem
#
# Requires containers to set securityContext.readOnlyRootFilesystem: true.
# A read-only root filesystem prevents attackers from:
#   - Writing malicious scripts to the container filesystem
#   - Modifying system binaries (supply chain attacks)
#   - Persisting backdoors that survive container restarts
#
# Containers that need writable directories should use emptyDir volumes
# mounted at specific paths (e.g., /tmp, /var/cache).
#
# Rego logic:
#   - Checks both containers[] and initContainers[]
#   - Rejects if readOnlyRootFilesystem is not explicitly set to true
#
# Corresponding constraint: constraints/read-only-root-filesystem.yaml
# (scoped to "applications" namespace only)
# =============================================================================
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sreadonlyrootfilesystem
  annotations:
    description: "Denies containers that do not have a read-only root filesystem."
spec:
  crd:
    spec:
      names:
        kind: K8sReadOnlyRootFilesystem
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sreadonlyrootfilesystem

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.readOnlyRootFilesystem == true
          msg := sprintf("Container '%v' does not have a read-only root filesystem. Set securityContext.readOnlyRootFilesystem to true.", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not container.securityContext.readOnlyRootFilesystem == true
          msg := sprintf("Init container '%v' does not have a read-only root filesystem. Set securityContext.readOnlyRootFilesystem to true.", [container.name])
        }
