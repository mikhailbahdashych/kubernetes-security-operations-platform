# =============================================================================
# RBAC — Service Accounts
#
# Dedicated ServiceAccounts for each operator tier. These enable programmatic
# access (from scripts or CI/CD) and are referenced in RoleBindings.
#
# Each ServiceAccount is created in the namespace where its primary workload
# runs, following the principle of least privilege.
# =============================================================================

# Tier 2: Security Operator SA — lives in security-monitoring where the
# security tools (Falco, Prometheus) are deployed
apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-operator
  namespace: security-monitoring
  labels:
    app: security-operator
---
# Tier 3: App Operator SA — lives in applications namespace, used by
# CI/CD pipelines to deploy application workloads
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-operator
  namespace: applications
  labels:
    app: app-operator
---
# Tier 4: Auditor SA — lives in default namespace, used by automated
# compliance scanning tools
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auditor
  namespace: default
  labels:
    app: auditor
