# =============================================================================
# Falco Custom Rules — Platform-Specific Runtime Detection
#
# Supplements Falco's built-in rules with custom detections tailored to the
# KSOP platform. These rules are loaded as a ConfigMap and mounted into
# the Falco pods (also duplicated in the Helm values for consistency).
#
# Rules are mapped to MITRE ATT&CK techniques:
#   - Terminal Shell in Container    -> T1059 (Execution)
#   - Sensitive File Access          -> T1003 (Credential Access)
#   - Unexpected Outbound Connection -> T1041 (Exfiltration)
#   - Privilege Escalation Attempt   -> T1548 (Privilege Escalation)
#
# Alert priority levels:
#   - WARNING  — suspicious but potentially legitimate activity
#   - CRITICAL — strong indicator of compromise, requires immediate response
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: security-monitoring
  labels:
    app: falco
data:
  custom-rules.yaml: |
    # -----------------------------------------------------------------
    # Rule: Terminal Shell in Container
    # MITRE ATT&CK: T1059 - Command and Scripting Interpreter
    #
    # Detects interactive shell sessions inside containers, which may
    # indicate an attacker executing commands after gaining initial access
    # or a developer bypassing CI/CD (both should be investigated).
    # -----------------------------------------------------------------
    - rule: Terminal Shell in Container
      desc: >
        Detect a shell (bash, sh, zsh) spawned inside a container.
        This may indicate interactive access or a container escape attempt.
      condition: >
        spawned_process
        and container
        and proc.name in (bash, sh, zsh)
      output: >
        Shell spawned in container
        (user=%user.name user_loginuid=%user.loginuid container_id=%container.id
        container_name=%container.name image=%container.image.repository
        shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline
        terminal=%proc.tty pid=%proc.pid %container.info)
      priority: WARNING
      tags:
        - container
        - shell
        - mitre_execution

    # -----------------------------------------------------------------
    # Rule: Sensitive File Access
    # MITRE ATT&CK: T1003 - OS Credential Dumping
    #
    # Detects reads of /etc/shadow or /etc/passwd inside containers.
    # Attackers read these files to harvest credentials for lateral
    # movement or privilege escalation.
    # -----------------------------------------------------------------
    - rule: Sensitive File Access
      desc: >
        Detect when a process inside a container reads sensitive files
        such as /etc/shadow or /etc/passwd.
      condition: >
        open_read
        and container
        and (fd.name = /etc/shadow or fd.name = /etc/passwd)
      output: >
        Sensitive file accessed in container
        (user=%user.name file=%fd.name container_id=%container.id
        container_name=%container.name image=%container.image.repository
        command=%proc.cmdline pid=%proc.pid %container.info)
      priority: WARNING
      tags:
        - container
        - filesystem
        - mitre_credential_access

    # -----------------------------------------------------------------
    # Rule: Unexpected Outbound Connection
    # MITRE ATT&CK: T1041 - Exfiltration Over C2 Channel
    #
    # Detects outbound network connections to public (non-RFC1918) IPs.
    # This may indicate data exfiltration, C2 communication, or
    # cryptomining. fd.typechar=4 filters for IPv4 connections only.
    # -----------------------------------------------------------------
    - rule: Unexpected Outbound Connection
      desc: >
        Detect outbound network connections from containers to
        non-RFC1918 (non-private) IP addresses.
      condition: >
        outbound
        and container
        and fd.typechar = 4
        and not (fd.sip.name in (rfc_1918_addresses))
        and not fd.sip = "0.0.0.0"
        and not fd.sip = ""
      output: >
        Unexpected outbound connection from container
        (user=%user.name command=%proc.cmdline connection=%fd.name
        container_id=%container.id container_name=%container.name
        image=%container.image.repository %container.info)
      priority: WARNING
      tags:
        - container
        - network
        - mitre_exfiltration

    # -----------------------------------------------------------------
    # Rule: Privilege Escalation Attempt
    # MITRE ATT&CK: T1548 - Abuse Elevation Control Mechanism
    #
    # Detects successful setuid/setgid syscalls inside containers.
    # These syscalls change the effective user/group ID of a process,
    # which is the primary mechanism for privilege escalation in Linux.
    # Marked CRITICAL because successful setuid in a container is
    # almost always an indicator of compromise.
    # -----------------------------------------------------------------
    - rule: Privilege Escalation Attempt
      desc: >
        Detect setuid or setgid system calls inside containers,
        which may indicate a privilege escalation attempt.
      condition: >
        container
        and (evt.type = setuid or evt.type = setgid)
        and evt.dir = <
        and evt.rawres = 0
      output: >
        Privilege escalation detected in container via %evt.type
        (user=%user.name user_loginuid=%user.loginuid command=%proc.cmdline
        uid=%evt.arg.uid container_id=%container.id
        container_name=%container.name image=%container.image.repository
        %container.info)
      priority: CRITICAL
      tags:
        - container
        - privilege_escalation
        - mitre_privilege_escalation
