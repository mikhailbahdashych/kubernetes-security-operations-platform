# =============================================================================
# Network Policy: Allow DNS Resolution
#
# Permits all pods in each namespace to reach CoreDNS in kube-system on
# port 53 (UDP and TCP). Without this policy, pods cannot resolve service
# names or external hostnames — effectively breaking all network communication.
#
# This is a required companion to the default-deny policy because DNS is
# a prerequisite for virtually all Kubernetes networking.
#
# Applied to: applications, security-monitoring, security-enforcement, wazuh-agents
# =============================================================================

# DNS egress for "applications" namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: applications
spec:
  podSelector: {}   # Applies to all pods
  policyTypes:
    - Egress
  egress:
    - to:
        # Target only the kube-system namespace where CoreDNS runs
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53       # TCP fallback for responses > 512 bytes
---
# DNS egress for "security-monitoring" namespace
