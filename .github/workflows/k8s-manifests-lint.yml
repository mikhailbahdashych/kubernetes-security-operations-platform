name: Kubernetes Manifests Lint

on:
  push:
    branches: [main]
    paths:
      - "kubernetes/**"
  pull_request:
    branches: [main]
    paths:
      - "kubernetes/**"

permissions:
  contents: read

jobs:
  kubeconform:
    name: Kubeconform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.4"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xzf - -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Validate Kubernetes manifests
        run: |
          echo "Validating manifests in kubernetes/manifests/..."
          find kubernetes/manifests/ -name '*.yaml' -o -name '*.yml' | \
            xargs -r kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version 1.29.0 \
              -summary \
              -output text

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Create yamllint config
        run: |
          cat > .yamllint.yml <<'EOF'
          extends: default
          rules:
            line-length:
              max: 200
              allow-non-breakable-inline-mappings: true
            truthy:
              allowed-values: ['true', 'false', 'yes', 'no']
            comments:
              min-spaces-from-content: 1
            document-start: disable
            indentation:
              spaces: 2
              indent-sequences: whatever
          EOF

      - name: Run yamllint
        run: |
          echo "Linting YAML files in kubernetes/..."
          find kubernetes/ -name '*.yaml' -o -name '*.yml' | \
            xargs -r yamllint -c .yamllint.yml
